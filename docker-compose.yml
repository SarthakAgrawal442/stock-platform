version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: stockplatform_db
    environment:
      POSTGRES_DB: stockplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  aspnet-api:
    build:
      context: ./StockPlatform.API
    container_name: stockplatform_api
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=stockplatform;Username=postgres;Password=yourpassword
      - PythonService__BaseUrl=http://python-service:8000
    depends_on:
      - postgres

  python-service:
    build:
      context: ./python-service
    container_name: stockplatform_python
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  react-frontend:
    build:
      context: ./react-frontend
    container_name: stockplatform_react
    ports:
      - "3000:3000"
    depends_on:
      - aspnet-api

volumes:
  pgdata:
